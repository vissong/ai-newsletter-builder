# Data sources for the newsletter.
# Edit freely — each source collects into site/data/raw/<date>/<name>.md.

sources:
  # ── Tier 1 news ────────────────────────────────────────
  - name: venturebeat-ai
    type: web
    enabled: true
    language: en
    priority: 1
    url: https://venturebeat.com/category/ai/
    extract: { item_limit: 10, time_window_hours: 48, follow_articles: false }

  - name: techcrunch-ai
    type: web
    enabled: true
    language: en
    priority: 1
    url: https://techcrunch.com/category/artificial-intelligence/
    extract: { item_limit: 10, time_window_hours: 48, follow_articles: false }

  - name: theverge-ai
    type: web
    enabled: true
    language: en
    priority: 1
    url: https://www.theverge.com/ai-artificial-intelligence
    extract: { item_limit: 10, time_window_hours: 48, follow_articles: false }

  - name: mit-tech-review-ai
    type: web
    enabled: true
    language: en
    priority: 1
    url: https://www.technologyreview.com/topic/artificial-intelligence/
    extract: { item_limit: 8, time_window_hours: 72, follow_articles: false }

  # ── Company blogs ──────────────────────────────────────
  - name: openai-blog
    type: web
    enabled: true
    language: en
    priority: 1
    url: https://openai.com/blog
    extract: { item_limit: 8, time_window_hours: 168, follow_articles: false }

  - name: anthropic-news
    type: web
    enabled: true
    language: en
    priority: 1
    url: https://www.anthropic.com/news
    extract: { item_limit: 8, time_window_hours: 168, follow_articles: false }

  - name: google-ai-blog
    type: web
    enabled: true
    language: en
    priority: 1
    url: https://blog.google/technology/ai/
    extract: { item_limit: 8, time_window_hours: 168, follow_articles: false }

  - name: deepmind-blog
    type: web
    enabled: true
    language: en
    priority: 1
    url: https://deepmind.google/discover/blog/
    extract: { item_limit: 8, time_window_hours: 168, follow_articles: false }

  # ── Research / open source ─────────────────────────────
  - name: arxiv-cs-ai
    type: web
    enabled: true
    language: en
    priority: 2
    url: https://arxiv.org/list/cs.AI/recent
    extract: { item_limit: 10, time_window_hours: 48, follow_articles: false }

  - name: arxiv-cs-lg
    type: web
    enabled: true
    language: en
    priority: 2
    url: https://arxiv.org/list/cs.LG/recent
    extract: { item_limit: 10, time_window_hours: 48, follow_articles: false }

  - name: arxiv-cs-cl
    type: web
    enabled: true
    language: en
    priority: 2
    url: https://arxiv.org/list/cs.CL/recent
    extract: { item_limit: 10, time_window_hours: 48, follow_articles: false }

  - name: huggingface-blog
    type: web
    enabled: true
    language: en
    priority: 2
    url: https://huggingface.co/blog
    extract: { item_limit: 8, time_window_hours: 168, follow_articles: false }

  - name: papers-with-code
    type: web
    enabled: true
    language: en
    priority: 3
    url: https://paperswithcode.com/
    extract: { item_limit: 8, time_window_hours: 168, follow_articles: false }

  # ── Chinese aggregators (需过滤广告) ──────────────────
  - name: 36kr-ai
    type: web
    enabled: true
    language: zh
    priority: 1
    url: https://36kr.com/search/articles/AI
    extract:
      item_limit: 15
      time_window_hours: 48
      follow_articles: false
      exclude_selectors: [".ad", ".sponsored", ".advert", "[class*=promo]", "[class*=推广]"]
      exclude_keywords: ["广告", "推广", "赞助", "sponsored", "AD"]

  - name: ai-bot-daily-news
    type: web
    enabled: true
    language: zh
    priority: 1
    url: https://ai-bot.cn/daily-ai-news/
    extract:
      item_limit: 20
      time_window_hours: 48
      follow_articles: false
      exclude_selectors: [".ad", ".sponsored", ".advert", "[class*=promo]", "[class*=推广]"]
      exclude_keywords: ["广告", "推广", "赞助", "sponsored", "AD"]

  - name: ai-bot-tools
    type: web
    enabled: true
    language: zh
    priority: 2
    url: https://ai-bot.cn/ai-tools/
    extract:
      item_limit: 15
      time_window_hours: 168   # tools directory 更新较慢，放宽窗口
      follow_articles: false
      exclude_selectors: [".ad", ".sponsored", ".advert", "[class*=promo]", "[class*=推广]"]
      exclude_keywords: ["广告", "推广", "赞助", "sponsored", "AD"]

  # ── 中文社交/内容平台 (部分 opt-in) ─────────────────
  # weixin-sogou: WebFetch 通常可用（~70-80% 命中），默认启用
  # weibo / douyin: 需 real_browser 能力（browser-use / web-access / CDP 桥），默认禁用
  - name: weixin-sogou
    type: web
    enabled: true
    language: zh
    priority: 2
    url: https://weixin.sogou.com/weixin?type=2&query=AI
    extract:
      item_limit: 15
      time_window_hours: 48
      follow_articles: false
      exclude_keywords: ["广告", "推广", "赞助"]
      preferred_accounts: ["机器之心", "新智元", "量子位", "智东西", "雷锋网", "36氪"]

  - name: weibo-ai-hot
    type: web
    enabled: false
    language: zh
    priority: 3
    url: https://s.weibo.com/weibo?q=AI&sort=hot&timescope=custom:24h
    requires_capability: real_browser   # browser-use / web-access / 任一 CDP 工具
    extract:
      item_limit: 8
      time_window_hours: 24
      exclude_keywords: ["广告", "推广", "转发抽奖", "福利"]

  - name: douyin-ai-hot
    type: web
    enabled: false
    language: zh
    priority: 3
    url: https://www.douyin.com/search/AI?sort_type=1
    requires_capability: real_browser
    extract:
      item_limit: 6
      time_window_hours: 24
      exclude_keywords: ["广告", "推广", "赞助"]

  # ── CLI tools ──────────────────────────────────────────
  - name: tencent-news-ai-search
    type: cli
    enabled: true
    language: zh
    priority: 1
    command: "tencent-news-cli search \"AI 大模型\" --limit 20 --caller ai-newsletter-builder"
    parser: tencent-news-cli
    check:
      binary: tencent-news-cli
      install_hint: "install from https://news.qq.com/exchange?scene=appkey then: tencent-news-cli apikey-set <your-key>"
    extract:
      item_limit: 20
      time_window_hours: 48
      exclude_keywords: ["ETF", "涨停", "跌停", "涨超", "跌超", "股票", "基金", "大盘", "行情"]

  - name: tencent-news-ai-agent
    type: cli
    enabled: true
    language: zh
    priority: 1
    command: "tencent-news-cli search \"AI 智能体 Agent\" --limit 15 --caller ai-newsletter-builder"
    parser: tencent-news-cli
    check:
      binary: tencent-news-cli
      install_hint: "install from https://news.qq.com/exchange?scene=appkey then: tencent-news-cli apikey-set <your-key>"
    extract:
      item_limit: 15
      time_window_hours: 48
      exclude_keywords: ["ETF", "涨停", "跌停", "股票", "基金"]

  - name: tencent-news-ai-funding
    type: cli
    enabled: true
    language: zh
    priority: 2
    command: "tencent-news-cli search \"人工智能 融资\" --limit 15 --caller ai-newsletter-builder"
    parser: tencent-news-cli
    check:
      binary: tencent-news-cli
      install_hint: "install from https://news.qq.com/exchange?scene=appkey then: tencent-news-cli apikey-set <your-key>"
    extract:
      item_limit: 15
      time_window_hours: 48
      exclude_keywords: ["个人理财", "P2P", "基金净值", "港股", "A股"]

  - name: tencent-news-ai-policy
    type: cli
    enabled: true
    language: zh
    priority: 2
    command: "tencent-news-cli search \"AI 政策 法规\" --limit 15 --caller ai-newsletter-builder"
    parser: tencent-news-cli
    check:
      binary: tencent-news-cli
      install_hint: "install from https://news.qq.com/exchange?scene=appkey then: tencent-news-cli apikey-set <your-key>"
    extract:
      item_limit: 15
      time_window_hours: 72      # 政策类更新较慢，适当放宽
      exclude_keywords: ["广告", "推广"]

  # ── Email (Gmail) ───────────────────────────────────
  - name: gmail-ai-newsletter
    type: email
    enabled: true
    provider: gmail
    cli: gog
    auth_hint: "首次使用需 `gog auth login`"
    language: zh            # 多为英文但会翻译成中文输出
    priority: 1
    query: "newer_than:1d label:ai-newsletter"
    extract:
      max_messages: 30
      include_body: true
      strip_quoted: true
      timeout_seconds: 60
      exclude_keywords: ["广告", "sponsored", "unsubscribe to stop"]
