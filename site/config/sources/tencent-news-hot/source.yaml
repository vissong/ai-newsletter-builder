check:
  binary: tencent-news-cli
  install_hint: 'Install from https://news.qq.com/exchange?scene=appkey and run: tencent-news-cli
    apikey-set <key>'
enabled: false
extract:
  exclude_keywords:
  - ETF
  - 涨停
  - 跌停
  - 涨超
  - 跌超
  - 股票
  - 基金
  - 大盘
  - 行情
  include_keywords:
  - AI
  - 人工智能
  - 大模型
  - GPT
  - LLM
  - 机器学习
  - 深度学习
language: zh
name: tencent-news-hot
priority: 3
recent_hours: 24
runtime: bash
script: fetch.sh
time_window_hours: 24
timeout_seconds: 30
type: script
