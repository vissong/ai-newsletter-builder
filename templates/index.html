<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title }}</title>
  <meta name="description" content="{{ subtitle }}">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site-header">
    <main>
      <a href="./">{{ title }}</a>
      <p><small>{{ subtitle }}</small></p>
    </main>
  </header>

  <main>
    <section class="intro">
      <h1>全部期号 · {{ issue_count }} 期</h1>
      <p><small>最近一次构建：{{ generated_at }}</small></p>
    </section>

    <ul class="issue-list">
      {{ issue_list }}
    </ul>

    <footer class="site-footer">
      <p>由 <code>ai-newsletter-builder</code> 生成 · <a href="data/issues.json">issues.json</a></p>
    </footer>
  </main>
</body>
</html>
