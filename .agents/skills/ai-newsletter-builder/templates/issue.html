<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title }}</title>
  <meta name="description" content="{{ lead_summary }}">
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <header class="site-header">
    <main>
      <a href="../">{{ site_title }}</a>
      <p><small>← 返回首页</small></p>
    </main>
  </header>

  <main>
    {{ hero }}

    <section class="lead">
      <p>{{ lead_summary }}</p>
      <p><small>共 {{ stats.total_items }} 条 · 来自 {{ stats.total_sources }} 个源 · 生成于 {{ generated_at }}</small></p>
    </section>

    {{ categories }}

    <nav class="issue-nav">
      {{ prev_link }}
      {{ next_link }}
    </nav>

    <footer class="site-footer">
      <p><a href="../">全部期号</a> · <a href="../data/issues.json">issues.json</a></p>
    </footer>
  </main>
</body>
</html>
